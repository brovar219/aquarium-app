name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  host-tests:
    name: Host unit tests (schedule engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure & build host tests
        run: cmake -S test/host -B build-host -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build-host
      - name: Run ctest
        run: ctest --test-dir build-host --output-on-failure

  ui-logic-tests:
    name: Web UI logic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run UI logic tests
        run: node components/aquarium_app/web/ui-logic.test.mjs

  firmware-build:
    name: Firmware build (ESP-IDF v5.5, esp32c6)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.5
    steps:
      - uses: actions/checkout@v4
      - name: idf.py build
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py set-target esp32c6
          idf.py build
